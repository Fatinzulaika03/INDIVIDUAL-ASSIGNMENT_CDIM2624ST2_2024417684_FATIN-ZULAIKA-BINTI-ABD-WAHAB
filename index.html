<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - StudentPortal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        #vanta-canvas { min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; background-color: #4a3460; }
        .card-login { max-width: 800px; width: 100%; border-radius: 20px; overflow: hidden; }
        .logo-icon { font-size: clamp(4rem, 10vw, 6rem); color: #7f5390; }
        @media (max-width: 767px) { .vr-divider { display: none; } }
    </style>
</head>
<body id="vanta-canvas">
    <div class="card shadow card-login">
        <div class="card-body p-0">
            <div class="row g-0">
                <div class="col-md-5 d-flex align-items-center justify-content-center bg-light p-4 position-relative">
                    <i class="fa-solid fa-graduation-cap logo-icon"></i>
                    <div class="vr-divider d-none d-md-block position-absolute end-0" style="height: 70%; width: 1px; background-color: #dee2e6;"></div>
                </div>
                <div class="col-md-7 p-4 p-lg-5">
                    <h4 class="fw-bold text-center mb-4">LOGIN</h4>
                    <div id="errorAlert" class="alert alert-danger d-none small">Username/Password Salah</div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Username</label>
                        <input type="text" id="username" class="form-control" placeholder="student">
                    </div>
                    <div class="mb-4">
                        <label class="form-label small fw-bold">Password</label>
                        <input type="password" id="password" class="form-control" placeholder="11111">
                    </div>
                    <div class="d-grid"><button id="loginBtn" class="btn bg-purple text-white fw-bold">MASUK</button></div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
    <script>
        VANTA.NET({ el: "#vanta-canvas", mouseControls: true, touchControls: true, color: 0x7f5390, backgroundColor: 0x4a3460 });
        document.getElementById('loginBtn').addEventListener('click', () => {
            if(document.getElementById('username').value === 'student' && document.getElementById('password').value === '11111') {
                window.location.href = "dashboard.html";
            } else { document.getElementById('errorAlert').classList.remove('d-none'); }
        });
    </script>
</body>
</html>
